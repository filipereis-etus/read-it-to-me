<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm paper base -->
  <rect width="512" height="512" rx="112" fill="#f7f5f1"/>

  <!-- Hairline editorial frame, subtle -->
  <rect x="36" y="36" width="440" height="440" rx="84" fill="none" stroke="#14110d" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- Issue overline -->
  <g transform="translate(256 128)" text-anchor="middle">
    <text font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="600" fill="#7a7366" letter-spacing="4">DAILY</text>
  </g>

  <!-- Fraunces-like italic R monogram — drawn so it renders identically on any device -->
  <g transform="translate(256 330)">
    <!-- Main R shape, composed from hand-drawn paths for a premium serif feel -->
    <path d="M -85 -145
             L -85 35
             M -85 -145
             L 20 -145
             Q 85 -145 85 -82
             Q 85 -22 20 -22
             L -50 -22
             M 10 -22
             L 85 50"
          stroke="#14110d" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Subtle italic lean lines -->
    <line x1="-102" y1="38" x2="-68" y2="38" stroke="#14110d" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Vermillion audio wave beneath, nods to "radio" -->
  <g transform="translate(256 420)" fill="#c1411e">
    <rect x="-84" y="-7" width="10" height="14" rx="5"/>
    <rect x="-54" y="-14" width="10" height="28" rx="5"/>
    <rect x="-24" y="-22" width="10" height="44" rx="5"/>
    <rect x="6" y="-14" width="10" height="28" rx="5"/>
    <rect x="36" y="-7" width="10" height="14" rx="5"/>
    <rect x="66" y="-11" width="10" height="22" rx="5"/>
  </g>
</svg>
