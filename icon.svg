<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Warm paper base -->
  <rect width="512" height="512" rx="112" fill="#f7f5f1"/>

  <!-- Editorial hairline frame -->
  <rect x="40" y="40" width="432" height="432" rx="84" fill="none" stroke="#14110d" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- "DAILY" overline -->
  <text x="256" y="130" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22" font-weight="700" fill="#7a7366" letter-spacing="4.5">DAILY</text>

  <!-- Italic serif R — drawn as geometry so it renders identically everywhere -->
  <g transform="translate(256 280)">
    <!-- Slight italic shear on the whole R -->
    <g transform="skewX(-8)">
      <!-- Left stem -->
      <path d="M -66 -130 L -66 66" stroke="#14110d" stroke-width="30" stroke-linecap="round"/>
      <!-- Top cap serif -->
      <path d="M -86 -130 L -44 -130" stroke="#14110d" stroke-width="14" stroke-linecap="round"/>
      <!-- Bottom cap serif -->
      <path d="M -86 66 L -44 66" stroke="#14110d" stroke-width="14" stroke-linecap="round"/>
      <!-- Bowl of the R -->
      <path d="M -66 -130 L 26 -130
               Q 92 -130 92 -60
               Q 92 8 26 8
               L -48 8"
            fill="none" stroke="#14110d" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Leg of the R, swept -->
      <path d="M 18 8 L 96 66" stroke="#14110d" stroke-width="30" stroke-linecap="round"/>
      <path d="M 78 66 L 120 66" stroke="#14110d" stroke-width="14" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Vermillion audio wave — five bars + tuning dot -->
  <g transform="translate(256 416)" fill="#c1411e">
    <rect x="-104" y="-5" width="11" height="12" rx="5.5"/>
    <rect x="-72" y="-12" width="11" height="26" rx="5.5"/>
    <rect x="-40" y="-20" width="11" height="42" rx="5.5"/>
    <rect x="-8" y="-12" width="11" height="26" rx="5.5"/>
    <rect x="24" y="-5" width="11" height="12" rx="5.5"/>
    <rect x="56" y="-10" width="11" height="22" rx="5.5"/>
    <rect x="88" y="-3" width="11" height="8" rx="5.5"/>
  </g>
</svg>
